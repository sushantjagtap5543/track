version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: geosurepath_db
    restart: always
    environment:
      POSTGRES_USER: geosurepath
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: geosurepath
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geosurepath_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  traccar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geosurepath_traccar
    restart: always
    depends_on:
      - db
    ports:
      - "8082:8082"
      - "5001-5150:5001-5150/tcp"
      - "5001-5150:5001-5150/udp"
    volumes:
      - ./logs:/opt/traccar/logs:rw
      - ./data:/opt/traccar/data:rw

  saas-api:
    build: ./saas
    container_name: geosurepath_saas_api
    restart: always
    depends_on:
      - db
      - redis
      - traccar
    ports:
      - "3001:3001"
    env_file:
      - ./saas/.env
    environment:
      - DATABASE_URL=postgresql://geosurepath:password123@db:5432/geosurepath?schema=public
      - REDIS_HOST=redis
      - TRACCAR_URL=http://traccar:8082

  nginx:
    image: nginx:alpine
    container_name: geosurepath_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - saas-api
      - traccar

volumes:
  db_data:
  redis_data:
