worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # GeoSurePath SaaS API
        location /api/ {
            # Route specific SaaS paths to Node.js backend
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass http://saas-api:3001/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/vehicles/ {
            proxy_pass http://saas-api:3001/api/vehicles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/billing/ {
            proxy_pass http://saas-api:3001/api/billing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/admin/ {
            proxy_pass http://saas-api:3001/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Traccar Core API and WebSockets
        location /api/ {
            proxy_pass http://traccar:8082/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Traccar Frontend (React)
        location / {
            proxy_pass http://traccar:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
